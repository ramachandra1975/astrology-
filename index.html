!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sacred Synthesis: Jātaka & Panchanga</title>
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      margin: 0;
      padding: 1rem 1.5rem;
      background: #f0f7ff;
      color: #112233;
    }
    h1, h2, h3 { color: #002266; }
    .card {
      background: #fff;
      border: 1px solid #c0d8ff;
      border-radius: 8px;
      padding: 1rem 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .form-row { margin: 0.5rem 0; }
    label { display: block; font-weight: 500; margin-bottom: 0.3rem; }
    input, select {
      width: 100%; padding: 0.5rem; border: 1px solid #aaa; border-radius: 4px; font-size: 1rem;
    }
    .btn {
      padding: 0.6rem 1.2rem; background: #002266; color: #fff; border: none;
      border-radius: 4px; font-size: 1rem; cursor: pointer;
    }
    .btn:hover { background: #001535; }
    .results, .phala, .remedies, .chakra, .events, .tithi {
      border-top: 2px solid #002266; padding-top: 0.8rem;
    }
    .chakra-canvas { text-align: center; padding: 1rem; background: #f9f9f9; border-radius: 6px; }
    #jatakaCanvas {
      border: 3px solid #002266 !important;
      border-radius: 50% !important;
      background: radial-gradient(circle, #fff8e1, #f5e8c7) !important;
      display: block !important;
      margin: 0 auto;
    }
    .planet-legend {
      margin-top: 1rem; font-size: 0.9rem; text-align: left; max-width: 400px; margin: 1rem auto;
    }
    .planet-legend span { margin-right: 0.5rem; font-weight: bold; }
  </style>
</head>
<body>

  <h1>Sacred Synthesis: Jātaka, Marriage & Events</h1>

  <!-- Birth input -->
  <div class="card">
    <h2>Enter Birth Details</h2>
    <div class="form-row">
      <label>Name:</label><input type="text" id="inputName" placeholder="Your name" />
    </div>
    <div class="form-row">
      <label>Date (YYYY-MM-DD):</label><input type="date" id="inputDate" value="1990-01-01" />
    </div>
    <div class="form-row">
      <label>Time:</label><input type="time" id="inputTime" value="12:00" />
    </div>
    <div class="form-row">
      <label>Place:</label><input type="text" id="inputPlace" value="Kurnool, India" />
    </div>
    <div class="form-row">
      <label>Language:</label>
      <select id="inputLanguage">
        <option value="english">English</option>
        <option value="hindi">हिंदी</option>
        <option value="telugu">తెలుగు</option>
      </select>
    </div>
    <button class="btn" onclick="computeJataka()">🔮 Compute Jātaka Chakra</button>
  </div>

  <!-- JATAKA CHAKRA - NOW VISIBLE -->
  <div class="card">
    <h2>जन्म कुंडली / Jātaka Chakra (South Indian Style)</h2>
    <div class="chakra-canvas">
      <canvas id="jatakaCanvas" width="420" height="420"></canvas>
      <div id="chakraLegend" class="planet-legend"></div>
    </div>
  </div>

  <!-- Results sections (same as before) -->
  <div class="card"><h2>Life Events</h2><div id="eventsOutput" class="events">Click Compute for predictions...</div></div>
  <div class="card"><h2>Tithi Calculator</h2>
    <div class="form-row"><label>Date:</label><input type="date" id="inputTithiDate" /></div>
    <div class="form-row"><label>Language:</label>
      <select id="inputTithiLang"><option value="english">English</option><option value="hindi">हिंदी</option></select>
    </div>
    <button class="btn" onclick="computeTithi()">Show Tithi</button>
    <div id="tithiOutput" class="tithi"></div>
  </div>
  <div class="card"><h2>Predictions</h2><div id="phalaOutput" class="phala"></div></div>
  <div class="card"><h2>Remedies</h2><div id="remedyOutput" class="remedies"></div></div>

  <script>
    // Planet data
    const planets = {
      Sun: {symbol:"☉",color:"#ffd700",abbr:"Su"},
      Moon:{symbol:"☽",color:"#c0c0c0",abbr:"Mo"},
      Mars:{symbol:"♂",color:"#ff4500",abbr:"Ma"},
      Mercury:{symbol:"☿",color:"#32cd32",abbr:"Me"},
      Jupiter:{symbol:"♃",color:"#4169e1",abbr:"Ju"},
      Venus:{symbol:"♀",color:"#ff69b4",abbr:"Ve"},
      Saturn:{symbol:"♄",color:"#708090",abbr:"Sa"},
      Rahu:{symbol:"☊",color:"#8b4513",abbr:"Ra"},
      Ketu:{symbol:"☋",color:"#ff1493",abbr:"Ke"}
    };

    // Draw chakra function - FIXED for all browsers
    function drawJatakaChakra(positions) {
      const canvas = document.getElementById('jatakaCanvas');
      const ctx = canvas.getContext('2d');
      const cx = 210, cy = 210, outerR = 190, houseR = 150, planetR = 130;

      // Clear & background
      ctx.clearRect(0, 0, 420, 420);
      ctx.fillStyle = '#f5e8c7';
      ctx.fillRect(0, 0, 420, 420);

      // Draw 12 houses (South Indian triangles)
      for(let i = 0; i < 12; i++) {
        const angle = (i * Math.PI * 2 / 12) + Math.PI / 24;
        const x1 = cx + outerR * Math.cos(angle);
        const y1 = cy + outerR * Math.sin(angle);
        const x2 = cx + outerR * Math.cos(angle + Math.PI / 12);
        const y2 = cy + outerR * Math.sin(angle + Math.PI / 12);

        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.closePath();
        
        ctx.fillStyle = i % 2 ? '#e3f2fd' : '#f3e5f5';
        ctx.fill();
        ctx.strokeStyle = '#1a237e';
        ctx.lineWidth = 2.5;
        ctx.stroke();

        // House numbers (bold center)
        const mx = cx + houseR * Math.cos(angle + Math.PI / 24);
        const my = cy + houseR * Math.sin(angle + Math.PI / 24);
        ctx.fillStyle = '#1a237e';
        ctx.font = 'bold 20px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText((i+1).toString(), mx, my);
      }

      // Draw planets
      document.getElementById('chakraLegend').innerHTML = '';
      Object.entries(positions).forEach(([name, house]) => {
        const p = planets[name];
        const angle = (house * Math.PI * 2 / 12) + Math.PI / 24;
        const px = cx + planetR * Math.cos(angle);
        const py = cy + planetR * Math.sin(angle);

        // Planet orb
        ctx.beginPath();
        ctx.arc(px, py, 16, 0, Math.PI*2);
        ctx.fillStyle = p.color;
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 3;
        ctx.stroke();

        // Symbol
        ctx.fillStyle = '#111';
        ctx.font = 'bold 22px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(p.symbol, px, py + 1);

        // Legend
        document.getElementById('chakraLegend').innerHTML += 
          `<span style="color:${p.color}">●</span>${p.abbr} ${name}<br>`;
      });

      // Title
      ctx.fillStyle = '#1a237e';
      ctx.font = 'bold 24px serif';
      ctx.textAlign = 'center';
      ctx.fillText('South Indian Rāśi Chakra', cx, 35);
    }

    // Sample positions for demo
    const demoPositions = {
      Sun:3, Moon:7, Mars:10, Mercury:4, Jupiter:1, Venus:8, Saturn:11, Rahu:0, Ketu:6
    };

    // Auto-draw on load
    window.onload = () => drawJatakaChakra(demoPositions);

    // Planetary positions from birth date
    function getPositions(dateStr) {
      const d = new Date(dateStr);
      const day = d.getDate() + d.getMonth() * 2;
      return {
        Sun: (day+0) %12, Moon:(day+4)%12, Mars:(day+8)%12,
        Mercury:(day+1)%12, Jupiter:(day+10)%12, Venus:(day+6)%12,
        Saturn:(day+11)%12, Rahu:(day+3)%12, Ketu:(day+9)%12
      };
    }

    function computeJataka() {
      const date = document.getElementById('inputDate').value;
      if(!date) return alert('Enter birth date');
      
      const positions = getPositions(date);
      drawJatakaChakra(positions);

      // Events (simplified dasha)
      const year = new Date(date).getFullYear();
      document.getElementById('eventsOutput').innerHTML = `
        <ul>
          <li>Marriage: ${year+26}-${year+28}</li>
          <li>Career peak: ${year+35}-${year+40}</li>
          <li>Spiritual growth: ${year+50}+</li>
        </ul>
      `;
      
      document.getElementById('phalaOutput').innerHTML = 'Strong Jupiter influence - success through wisdom.';
      document.getElementById('remedyOutput').innerHTML = 'Chant Guru mantra Thursdays.';
    }

    function computeTithi() {
      const date = document.getElementById('inputTithiDate').value;
      if(!date) return alert('Select date');
      document.getElementById('tithiOutput').innerHTML = `<p>Tithi: Shukla Pratipada</p>`;
    }
  </script>
</body>
</html>
